<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Фильмотек</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <!-- Блок слева: бургер-меню, логотип и категории -->
        <div class="header-left">
            <button class="menu-toggle" id="menu-toggle" aria-label="Открыть меню">&#9776;</button>
            <a href="#" class="logo" id="logo-link">Фильмы Онлайн</a>
            <nav class="nav-menu" id="nav-menu">
                <ul class="nav-links" id="category-menu">
                    <li><a href="#" class="menu-cat active" data-category="all">Все фильмы</a></li>
                    <li><a href="#" class="menu-cat" data-category="боевик">Боевики</a></li>
                    <li><a href="#" class="menu-cat" data-category="комедия">Комедии</a></li>
                    <li><a href="#" class="menu-cat" data-category="фантастика">Фантастика</a></li>
                </ul>
            </nav>
        </div>
        <!-- Блок справа: живой поиск -->
        <div class="header-right">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск по названию...">
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="container">
        
        <!-- БЛОК КАТАЛОГА (СТРАНИЦА СПИСКА ФИЛЬМОВ) -->
        <div id="catalog-section">
            <!-- Сетка с карточками фильмов -->
            <section class="movie-grid" id="movie-grid"></section>

            <!-- Пагинация (находится сразу под фильмами) -->
            <div id="pagination" class="pagination text-center" style="margin: 30px 0; display: flex; justify-content: center; gap: 10px; align-items: center;">
                <!-- Кнопки генерируются автоматически через JavaScript -->
            </div>

            <!-- Популярные теги в каталоге -->
            <section class="filters text-center" style="border-top: 1px solid #222; padding-top: 20px; margin-top: 30px;">
                <h3>Популярные теги:</h3>
                <div id="tag-buttons">
                    <button class="btn-tag" data-tag="2025">2025</button>
                    <button class="btn-tag" data-tag="Marvel">Marvel</button>
                    <button class="btn-tag" data-tag="роботы">Роботы</button>
                    <button class="btn-tag" data-tag="классика">Классика</button>
                </div>
            </section>
        </div>

        <!-- БЛОК ОНЛАЙН КИНОТЕАТРА (ИЗНАЧАЛЬНО СКРЫТ) -->
        <section id="player-section" class="player-section hidden">
            <button id="back-to-catalog" class="btn-back">&larr; Назад к списку</button>
            
            <!-- Контейнер для адаптивного iframe плеера ВК -->
            <div id="video-container"></div>
            
            <!-- Информация о выбранном фильме -->
            <h1 id="movie-title" style="margin: 15px 0 5px;"></h1>
            <p id="movie-category" style="color: #e50914; font-weight: bold; margin-bottom: 15px;"></p>
            <p id="movie-desc" style="line-height: 1.6; color: #ccc; max-width: 800px; margin-bottom: 40px;"></p>
            
             <!-- НОВЫЙ КОНТЕЙНЕР: Теги текущего фильма -->
            <div id="movie-player-tags" style="margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
            
            <!-- Блок рекомендаций похожих фильмов -->
            <div class="similar-section">
                <h2 style="margin-bottom: 20px; font-size: 20px;">Похожие фильмы</h2>
                <div class="movie-grid" id="similar-movies-grid"></div>
                            <!-- НОВАЯ КНОПКА: Показать еще для похожих фильмов -->
                <div class="text-center" style="margin-top: 20px;">
                    <button id="load-more-similar-btn" class="pagination-btn hidden">Показать еще</button>
                </div>    
                
            </div>

            <!-- Популярные теги внутри плеера -->
            <section class="filters text-center" style="border-top: 1px solid #222; padding-top: 20px; margin-top: 40px;">
                <h3>Искать по тегам:</h3>
                <div id="player-tag-buttons">
                    <button class="btn-tag" data-tag="2025">2025</button>
                    <button class="btn-tag" data-tag="Marvel">Marvel</button>
                    <button class="btn-tag" data-tag="роботы">Роботы</button>
                    <button class="btn-tag" data-tag="классика">Классика</button>
                </div>
            </section>
        </section>
    </main>

    <!-- Фиксированная кнопка "Вверх" -->
    <button id="scroll-top-btn" class="scroll-top-btn" aria-label="Наверх">&#8593;</button>

    <!-- Подключение файла логики -->
    <script src="script.js"></script>
</body>
</html>
